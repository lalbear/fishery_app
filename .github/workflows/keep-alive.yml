name: Keep Render Backend Alive

# ⏰ GitHub Actions cron runs in UTC.
# Shortest reliable interval via cron syntax is every 15 min ("*/15 * * * *"),
# but GitHub does NOT support sub-15-minute intervals natively.
# We work around this by using a matrix strategy (4 jobs staggered by ~3 min
# via sleep) inside a single 15-min cron tick → effective ping every ~3–4 min.
# This is more than enough to prevent Render free-tier sleep (15-min idle).

on:
  schedule:
    # Runs every 15 minutes (UTC). GitHub's minimum supported cron interval.
    # ⚠️ Note: GitHub Actions cron can be delayed by 5–15 min under high load.
    # For hard production SLAs, use UptimeRobot (free) as a fallback — see README.
    - cron: "*/15 * * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest

    # Run 4 staggered pings within the same 15-min window:
    # job 0 → immediate, job 1 → ~4 min, job 2 → ~8 min, job 3 → ~12 min
    strategy:
      matrix:
        delay: [0, 240, 480, 720]   # seconds to sleep before pinging

    steps:
      - name: Wait before ping (${{ matrix.delay }}s delay)
        if: matrix.delay > 0
        run: sleep ${{ matrix.delay }}

      - name: Ping Render backend /health
        run: |
          echo "⏰ $(date -u '+%Y-%m-%d %H:%M:%S UTC') — pinging backend..."

          HTTP_STATUS=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "${{ secrets.RENDER_BACKEND_URL }}/health")

          echo "📡 HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Backend is awake and healthy."
          elif [ "$HTTP_STATUS" -eq 0 ]; then
            echo "❌ Connection failed (status 0). Backend may be down or URL is wrong."
            exit 1
          else
            echo "⚠️  Unexpected status $HTTP_STATUS — backend responded but may have an issue."
            exit 1
          fi
