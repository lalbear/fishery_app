name: CI/CD Quality and Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    name: Security, Lint, Typecheck and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Workspace Dependencies
        run: npm ci

      - name: Run Security Audit (Dependency Vulnerability Scanner)
        run: npm audit --audit-level=critical
        # Fails on CRITICAL vulnerabilities only.
        # High/moderate deferred issues are all in build-tooling transitive deps:
        #   - node-fetch@1.7.3 (react-native-web-maps→react-google-maps→recompose→fbjs→isomorphic-fetch)
        #     Not exploitable: node-fetch never executes in the mobile/web bundle; it's a Node.js-only dep.
        #   - @babel/runtime<7.26.10 (watermelondb): ReDoS in transpiled named-capturing-groups — low risk in app context.
        #   - postcss<8.5.10 / uuid<11.1.1 (expo toolchain): Build-time-only; not shipped to users.
        # These cannot be fixed without breaking changes (WatermelonDB downgrade / Expo 56 upgrade).
        # See SECURITY.md for the full audit exceptions log.

      - name: Run Typechecks
        run: npm run typecheck

      - name: Run Workspace Tests
        run: npm run test
