<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004c0d",
                        "background-light": "#f5f8f6",
                        "background-dark": "#0f2312",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%238dce98' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Edit Profile</h1>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 px-4 py-6 space-y-8">
<!-- Profile Avatar Section -->
<section class="flex flex-col items-center gap-4">
<div class="relative group">
<div class="size-32 rounded-full overflow-hidden border-4 border-primary/20 dark:border-primary/40 bg-primary/10 flex items-center justify-center">
<img alt="Profile photo" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling fisherman" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBNb4mHHizYeOa1s3S9Vrezp0Z3OWBlVTE6wrzVNg9cb4yiw8E38pXefWuMD2ootCXA61oDkmQ1S8L7LDb8_62wgsN8KQ1u3_g9igJUbOe---KM3LeTCNIwTa27qKIUrlBtbZvbJJN9YTOSlmuNS5tfEdRdcJE6cTc4eLQp13qY2l4ZDm7SIppcMPNo0aZLajapIsc_MIkuUq5laAqx5W5lcTc8r9MVvlRpv1V9ynJzxPqv6ayx8tCJ4lE9gNM6vJo2_BSyk4mumcI"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-background-dark flex items-center justify-center hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</button>
</div>
<div class="text-center">
<h2 class="text-2xl font-bold dark:text-slate-100">Fishing God</h2>
<p class="text-primary font-medium opacity-80">Aquaculture Specialist</p>
</div>
</section>
<!-- Form Fields -->
<form class="space-y-6">
<div class="space-y-4">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary opacity-60">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-primary/20 dark:border-primary/40 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="full_name" name="full_name" placeholder="Enter your full name" type="text" value="Fishing God"/>
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary opacity-60">call</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-primary/20 dark:border-primary/40 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Farmer Category -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="category">Farmer Category</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary opacity-60">category</span>
<select class="custom-select w-full pl-12 pr-10 py-4 rounded-xl border border-primary/20 dark:border-primary/40 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="category" name="category">
<option disabled="" selected="" value="">Select category</option>
<option value="marginal">Marginal Farmer</option>
<option value="small">Small Farmer</option>
<option value="large">Large Farmer</option>
</select>
</div>
</div>
<!-- State -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="state">State / Region</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary opacity-60">location_on</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-primary/20 dark:border-primary/40 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="state" name="state" placeholder="Enter your state" type="text"/>
</div>
</div>
</div>
<!-- Footer/Action Button -->
<div class="pt-4 pb-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">save</span>
                        Save Changes
                    </button>
<p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-4">
                        Information is used for regional aquaculture optimization.
                    </p>
</div>
</form>
</main>
<!-- Bottom Navigation Spacer (Mobile friendly) -->
<div class="h-6"></div>
</div>
</body></html>
