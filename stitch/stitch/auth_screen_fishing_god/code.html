<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fishing God - Aquaculture Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004c0d",
                        "background-light": "#f5f8f6",
                        "background-dark": "#0f2312",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header Section -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-primary/10 dark:border-primary/20">
<div class="text-primary dark:text-slate-100 flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-4xl">phishing</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Fishing God</h2>
</div>
<!-- Hero Branding -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/20 @[480px]:rounded-xl min-h-[240px] relative" data-alt="Calm deep green pond water surface ripple" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDKFHvFEy04C7I6NebiiJd0B4zA0PszUiqZpNMsTjQDJJe71kUCMX_HDoD5D3bKcMIaMEIptY3TwdCiG0yoofYV6tqn93m_h7tvL6nn705VPdT_zr3VIe8PK43oNi0am0fcEM8dOQ3FNVUxboCm2pmblDZefBnJt8UlOkcqJUn7V2sk-CMvvvBZ-2TShqKDVJ6uvTkJUP0S-zH49gOSV4s85FjfGfL7ieVetkwfcZmei-fJ6z2n5XyN7DSlV3eaMoJSDyI-QeWu6h4");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 to-transparent"></div>
</div>
</div>
</div>
<div class="max-w-md mx-auto w-full px-4">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight text-center pb-2 pt-6">Welcome to Fishing God</h1>
<p class="text-slate-600 dark:text-slate-300 text-base font-normal leading-normal pb-6 px-4 text-center">Premium aquaculture management for modern farmers</p>
<!-- Auth Tabs -->
<div class="pb-6">
<div class="flex border-b border-primary/20 dark:border-primary/40 px-0 justify-between">
<button class="flex flex-col items-center justify-center border-b-[3px] border-b-primary text-primary dark:text-white pb-[13px] pt-4 flex-1">
<span class="text-sm font-bold leading-normal tracking-[0.015em]">Login</span>
</button>
<button class="flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-slate-500 dark:text-slate-400 pb-[13px] pt-4 flex-1">
<span class="text-sm font-bold leading-normal tracking-[0.015em]">Sign Up</span>
</button>
</div>
</div>
<!-- Login Form (Visible by default) -->
<form class="flex flex-col gap-4 pb-12">
<!-- Phone Input -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-200 ml-1">Phone Number</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">smartphone</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border-2 border-primary/10 dark:border-primary/20 bg-white dark:bg-primary/5 focus:border-primary focus:ring-0 text-slate-900 dark:text-white transition-all text-lg" placeholder="+91 00000 00000" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-200 ml-1">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">lock</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border-2 border-primary/10 dark:border-primary/20 bg-white dark:bg-primary/5 focus:border-primary focus:ring-0 text-slate-900 dark:text-white transition-all text-lg" placeholder="Enter password" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-slate-400 cursor-pointer">visibility</span>
</div>
<div class="flex justify-end">
<button class="text-primary dark:text-green-400 text-sm font-semibold mt-1" type="button">Forgot Password?</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2 mt-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 my-4">
<div class="h-px bg-primary/10 dark:bg-primary/30 flex-1"></div>
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest">or sign up</span>
<div class="h-px bg-primary/10 dark:bg-primary/30 flex-1"></div>
</div>
<!-- Sign Up Fields (Hidden in Login view but shown for reference of the requested UI) -->
<div class="grid grid-cols-1 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-200 ml-1">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">person</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border-2 border-primary/10 dark:border-primary/20 bg-white dark:bg-primary/5 focus:border-primary focus:ring-0 text-slate-900 dark:text-white transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-200 ml-1">State (India)</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">location_on</span>
<select class="w-full h-14 pl-12 pr-4 rounded-xl border-2 border-primary/10 dark:border-primary/20 bg-white dark:bg-primary/5 focus:border-primary focus:ring-0 text-slate-900 dark:text-white transition-all appearance-none">
<option disabled="" selected="" value="">Select your state</option>
<option>Andhra Pradesh</option>
<option>Bihar</option>
<option>Gujarat</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Odisha</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>West Bengal</option>
</select>
<span class="material-symbols-outlined absolute right-4 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
</div>
<button class="w-full h-14 bg-primary/10 dark:bg-primary/20 text-primary dark:text-green-400 rounded-xl font-bold text-lg border-2 border-transparent hover:border-primary/30 transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined">person_add</span>
<span>Create New Account</span>
</button>
</form>
</div>
<!-- Footer -->
<div class="mt-auto p-6 text-center">
<p class="text-slate-400 text-sm">By continuing, you agree to our <br/> <span class="text-primary dark:text-green-400 font-semibold underline">Terms of Service</span> and <span class="text-primary dark:text-green-400 font-semibold underline">Privacy Policy</span></p>
</div>
</div>
</body></html>
